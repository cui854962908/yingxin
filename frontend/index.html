<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="color-scheme" content="light only" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700;800&family=Noto+Serif+SC:wght@600;700;800;900&display=swap" rel="stylesheet" />
    <title>河南牧业经济学院 · 迎新系统</title>
    <script>
      function setVH() {
        var h = window.visualViewport ? window.visualViewport.height : window.innerHeight
        document.documentElement.style.setProperty('--vh', h * 0.01 + 'px')
      }
      setVH()
      window.addEventListener('resize', setVH)
      window.addEventListener('orientationchange', function () { setTimeout(setVH, 100) })
      if (window.visualViewport) {
        window.visualViewport.addEventListener('resize', setVH)
        window.visualViewport.addEventListener('scroll', setVH)
      }
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
