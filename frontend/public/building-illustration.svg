<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 100" width="220" height="100">
  <!--
    河南牧业经济学院 校门线稿插画
    从照片提取建筑轮廓 → 简化为关键结构线 → SVG path
    风格：手绘线描稿，暖白半透明，融入侧边栏深红背景
  -->
  <g stroke="rgba(242, 230, 208, 0.2)" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round" fill="none">

    <!-- ===== 屋顶上层：主脊线与飞檐 ===== -->
    <!-- 主屋脊线（微微上弧） -->
    <path d="M42 8 Q110 -2 178 8" />
    <!-- 屋顶上缘（左→中→右，略带弧度） -->
    <path d="M36 14 Q60 4 110 2 Q160 4 184 14" />
    <!-- 左飞檐（上翘） -->
    <path d="M36 14 Q30 16 25 22" />
    <!-- 右飞檐（上翘） -->
    <path d="M184 14 Q190 16 195 22" />
    <!-- 左檐口弧线 -->
    <path d="M25 22 Q50 18 80 14" />
    <!-- 右檐口弧线 -->
    <path d="M195 22 Q170 18 140 14" />

    <!-- ===== 屋顶下层：重檐 ===== -->
    <!-- 下层屋脊 -->
    <path d="M52 20 Q110 10 168 20" />
    <!-- 下层左飞檐 -->
    <path d="M52 20 Q44 24 40 32" />
    <!-- 下层右飞檐 -->
    <path d="M168 20 Q176 24 180 32" />
    <!-- 下层檐口左段 -->
    <path d="M40 32 Q68 24 95 19" />
    <!-- 下层檐口右段 -->
    <path d="M180 32 Q152 24 125 19" />

    <!-- ===== 斗拱/装饰层 ===== -->
    <!-- 横枋上缘 -->
    <line x1="55" y1="26" x2="165" y2="26" />
    <!-- 横枋下缘 -->
    <line x1="58" y1="32" x2="162" y2="32" />

    <!-- ===== 牌匾区域 ===== -->
    <!-- 牌匾上边 -->
    <line x1="84" y1="34" x2="136" y2="34" />
    <!-- 牌匾下边 -->
    <line x1="84" y1="42" x2="136" y2="42" />
    <!-- 牌匾左边 -->
    <line x1="84" y1="34" x2="84" y2="42" />
    <!-- 牌匾右边 -->
    <line x1="136" y1="34" x2="136" y2="42" />

    <!-- ===== 中央门拱 ===== -->
    <!-- 门拱弧线 -->
    <path d="M74 62 Q74 38 110 38 Q146 38 146 62" />
    <!-- 门柱左 -->
    <line x1="74" y1="42" x2="74" y2="86" />
    <!-- 门柱右 -->
    <line x1="146" y1="42" x2="146" y2="86" />

    <!-- ===== 两侧立柱 ===== -->
    <!-- 左柱外侧 -->
    <line x1="44" y1="34" x2="44" y2="88" />
    <!-- 左柱内侧 -->
    <line x1="50" y1="34" x2="50" y2="88" />
    <!-- 右柱内侧 -->
    <line x1="170" y1="34" x2="170" y2="88" />
    <!-- 右柱外侧 -->
    <line x1="176" y1="34" x2="176" y2="88" />

    <!-- ===== 门槛/地梁 ===== -->
    <line x1="44" y1="88" x2="176" y2="88" />

    <!-- ===== 台基层 ===== -->
    <!-- 第一级台阶 -->
    <line x1="34" y1="92" x2="186" y2="92" />
    <!-- 第二级台阶 -->
    <line x1="28" y1="96" x2="192" y2="96" />
    <!-- 台基底线 -->
    <line x1="22" y1="99" x2="198" y2="99" />

    <!-- ===== 台阶垂带（两侧斜线） ===== -->
    <line x1="34" y1="88" x2="28" y2="96" />
    <line x1="186" y1="88" x2="192" y2="96" />
    <line x1="28" y1="92" x2="22" y2="99" />
    <line x1="192" y1="92" x2="198" y2="99" />

    <!-- ===== 屋顶装饰（脊兽/鸱尾暗示） ===== -->
    <!-- 左脊端小弧 -->
    <path d="M42 8 Q38 6 34 10" />
    <!-- 右脊端小弧 -->
    <path d="M178 8 Q182 6 186 10" />

    <!-- ===== 门洞内地面线 ===== -->
    <line x1="74" y1="86" x2="146" y2="86" stroke-width="0.8" />

  </g>
</svg>
