services:
  backend:
    build:
      context: ./backend
      dockerfile: ../docker/Dockerfile.backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: ../docker/Dockerfile.frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend

  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: welcome
      POSTGRES_PASSWORD: welcome
      POSTGRES_DB: welcome_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U welcome -d welcome_db"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
