# student-welcome 主库（welcome_db）。后端 DATABASE_URL 必须指向本服务映射端口，勿指向独立 Agent 库。
services:
  postgres:
    # pgvector 扩展；向量检索见 app/crud/document.py
    image: pgvector/pgvector:pg16
    container_name: welcome-postgres
    environment:
      POSTGRES_USER: welcome
      POSTGRES_PASSWORD: welcome
      POSTGRES_DB: welcome_db
    ports:
      # 若 5433 已被其它容器占用（例如 erp-postgres），请改用未占用端口并同步修改 .env
      - "5432:5432"
    volumes:
      - welcome_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U welcome -d welcome_db"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  welcome_pg_data:
